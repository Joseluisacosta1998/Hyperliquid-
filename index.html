<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HL Chart</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--bg2:#0e1018;--bg3:#13161f;--bg4:#1a1e2a;
  --green:#00e5a0;--red:#ff4466;--yellow:#f5a623;
  --text:#e2e8f4;--muted:#5a6278;--muted2:#3d4358;
  --border:#1f2435;--border2:#262c3d;
  --accent:#5b6ef5;--accent2:#7c8cf8;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'Inter',sans-serif;
}
html{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:none}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);
  overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0;
  overscroll-behavior:none;touch-action:none;display:flex;flex-direction:column}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#asset-btn{display:flex;align-items:center;gap:6px;background:var(--bg4);
  border:1px solid var(--border2);border-radius:8px;padding:6px 11px;cursor:pointer;
  font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text);transition:all .15s}
#asset-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#asset-btn .arrow{font-size:8px;color:var(--muted)}
#price-block{display:flex;flex-direction:column;gap:1px;margin-left:2px}
#price-display{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--text)}
#price-display.up{color:var(--green)}#price-display.down{color:var(--red)}
#price-change{font-family:var(--font-mono);font-size:11px;font-weight:600}
.tf-group{display:flex;gap:3px;margin-left:4px}
.tf-btn{padding:5px 9px;border-radius:7px;border:1px solid transparent;background:transparent;
  color:var(--muted);font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .12s}
.tf-btn:hover{color:var(--text);background:var(--bg4);border-color:var(--border2)}
.tf-btn.active{background:rgba(91,110,245,.12);border-color:var(--accent);color:var(--accent2)}
.stat-block{display:flex;flex-direction:column;gap:1px;padding:0 8px;border-left:1px solid var(--border)}
.stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono)}
.stat-value{font-size:12px;font-family:var(--font-mono);font-weight:600}
.stat-value.up{color:var(--green)}.stat-value.down{color:var(--red)}.stat-value.neutral{color:var(--yellow)}
#refresh-btn{margin-left:auto;display:flex;align-items:center;gap:5px;background:var(--bg4);
  border:1px solid var(--border2);border-radius:8px;padding:5px 10px;cursor:pointer;
  font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--text);transition:all .2s;flex-shrink:0}
#refresh-btn:hover{border-color:var(--accent);color:var(--accent2)}
#refresh-btn.loading #refresh-icon{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#refresh-icon{display:inline-block;font-size:13px}

/* ── MAIN CHART AREA ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:0}
#chart-container{flex:1;position:relative;min-height:0}
#lw-chart{width:100%;height:100%}

/* ── JUMP TO LATEST BUTTON ── */
#jump-btn{position:absolute;right:10px;bottom:36px;width:34px;height:34px;border-radius:50%;
  background:var(--bg4);border:1px solid var(--border2);color:var(--accent2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .18s ease,transform .18s ease,border-color .18s,background .18s;
  box-shadow:0 2px 12px rgba(0,0,0,.5)}
#jump-btn.show{opacity:1;pointer-events:auto;transform:translateY(0)}
#jump-btn:hover{border-color:var(--accent);background:var(--bg3);color:#fff}
#jump-btn svg{width:15px;height:15px}

/* ── OHLCV TOOLTIP (crosshair) ── */
#tooltip{position:absolute;pointer-events:none;background:rgba(14,16,24,.95);
  border:1px solid var(--border2);border-radius:8px;padding:8px 12px;
  font-family:var(--font-mono);font-size:10px;display:none;z-index:30;
  white-space:nowrap;min-width:150px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.t-row{display:flex;justify-content:space-between;gap:14px;padding:2px 0}
.t-lbl{color:var(--muted)}

/* ── LOADER ── */
#loader{position:absolute;inset:0;background:var(--bg);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20}
.spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite}
#loader-text{font-family:var(--font-mono);font-size:11px;color:var(--muted)}

/* ── BOTTOM BAR ── */
#bottombar{display:flex;align-items:center;background:var(--bg2);
  border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.bottom-stat{padding:6px 14px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.bottom-stat .bl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono)}
.bottom-stat .bv{font-size:11px;font-family:var(--font-mono);font-weight:600}

/* ── SEARCH MODAL ── */
#search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:flex-start;justify-content:center;padding-top:60px}
#search-overlay.open{display:flex}
#search-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  width:460px;max-width:calc(100vw - 32px);max-height:520px;display:flex;flex-direction:column;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7)}
#search-input{padding:14px 16px;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--font-mono);font-size:14px;outline:none;width:100%}
#search-input::placeholder{color:var(--muted)}
#asset-list{overflow-y:auto;max-height:420px}
.asset-item{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;transition:background .1s;border-bottom:1px solid rgba(31,36,53,.5)}
.asset-item:hover{background:var(--bg4)}
.asset-item .name{font-family:var(--font-mono);font-size:13px;font-weight:600}
.asset-item .tag{font-size:10px;color:var(--muted);padding:2px 6px;border-radius:4px;background:var(--bg4)}
/* scrollbar */
#asset-list::-webkit-scrollbar{width:4px}
#asset-list::-webkit-scrollbar-track{background:var(--bg2)}
#asset-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#bottombar::-webkit-scrollbar{height:3px}
#bottombar::-webkit-scrollbar-track{background:var(--bg2)}
#bottombar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button id="asset-btn">
    <span id="asset-name">BTC</span>
    <span style="color:var(--muted);font-size:11px">-PERP</span>
    <span class="arrow">▼</span>
  </button>
  <div id="price-block">
    <span id="price-display">—</span>
    <span id="price-change" style="color:var(--muted)">—</span>
  </div>
  <div class="tf-group">
    <button class="tf-btn" data-tf="1">1m</button>
    <button class="tf-btn" data-tf="5">5m</button>
    <button class="tf-btn active" data-tf="15">15m</button>
    <button class="tf-btn" data-tf="60">1h</button>
    <button class="tf-btn" data-tf="240">4h</button>
    <button class="tf-btn" data-tf="1440">1D</button>
  </div>
  <div class="stat-block">
    <span class="stat-label">24h High</span>
    <span class="stat-value up" id="stat-high">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">24h Low</span>
    <span class="stat-value down" id="stat-low">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">Open Int.</span>
    <span class="stat-value neutral" id="stat-oi">—</span>
  </div>
  <div class="stat-block">
    <span class="stat-label">Funding</span>
    <span class="stat-value" id="stat-funding">—</span>
  </div>
  <button id="refresh-btn" title="Actualizar todos los datos">
    <span id="refresh-icon">&#x21bb;</span>
    <span>Actualizar</span>
  </button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="chart-container">
    <div id="lw-chart"></div>
    <!-- Botón ir al último precio -->
    <button id="jump-btn" title="Ir al precio actual" onclick="jumpToRealtime()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
      </svg>
    </button>
    <!-- Tooltip OHLCV -->
    <div id="tooltip">
      <div class="t-row"><span class="t-lbl">Tiempo</span><span id="tt-time">—</span></div>
      <div class="t-row"><span class="t-lbl">Apertura</span><span id="tt-open">—</span></div>
      <div class="t-row"><span class="t-lbl">Máximo</span><span id="tt-high" style="color:var(--green)">—</span></div>
      <div class="t-row"><span class="t-lbl">Mínimo</span><span id="tt-low" style="color:var(--red)">—</span></div>
      <div class="t-row"><span class="t-lbl">Cierre</span><span id="tt-close">—</span></div>
      <div class="t-row"><span class="t-lbl">Volumen</span><span id="tt-vol">—</span></div>
    </div>
    <div id="loader"><div class="spinner"></div><div id="loader-text">Cargando datos…</div></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <div class="bottom-stat"><span class="bl">Mark Price</span><span class="bv" id="b-mark">—</span></div>
  <div class="bottom-stat"><span class="bl">Index Price</span><span class="bv" id="b-index">—</span></div>
  <div class="bottom-stat"><span class="bl">Vol Total (USDC)</span><span class="bv" id="b-vol">—</span></div>
  <div class="bottom-stat"><span class="bl">Open Interest</span><span class="bv" id="b-oi">—</span></div>
  <div class="bottom-stat"><span class="bl">Funding Rate</span><span class="bv" id="b-fund">—</span></div>
  <div class="bottom-stat"><span class="bl">Próx. Funding</span><span class="bv" id="b-nextfund" style="color:var(--yellow)">—</span></div>
</div>

<!-- SEARCH MODAL -->
<div id="search-overlay">
  <div id="search-box">
    <input id="search-input" placeholder="Buscar activo… (ej: ETH, SOL)" autocomplete="off"/>
    <div id="asset-list"></div>
  </div>
</div>

<script>
'use strict';
// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const API = 'https://api.hyperliquid.xyz/info';
const GREEN='#00e5a0', RED='#ff4466', YELLOW='#f5a623';
const CANDLE_LIMIT = 1000;

// Mapeo de minutos → string que acepta la API de Hyperliquid
const TF_MAP = {1:'1m',5:'5m',15:'15m',60:'1h',240:'4h',1440:'1d'};

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let candles=[], asset='BTC', interval=15, allAssets=[];
let lwChart=null, candleSeries=null, volSeries=null;
let userScrolled=false;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const loader    = document.getElementById('loader');
const loaderTxt = document.getElementById('loader-text');
const tooltip   = document.getElementById('tooltip');

// ─── INIT LIGHTWEIGHT-CHARTS ─────────────────────────────────────────────────
function initChart(){
  const el = document.getElementById('lw-chart');
  lwChart = LightweightCharts.createChart(el, {
    layout:{
      background:{color:'rgba(0,0,0,0)'},
      textColor:'#5a6278',
      fontFamily:'IBM Plex Mono, monospace',
      fontSize:10,
    },
    grid:{
      vertLines:{color:'rgba(255,255,255,0.03)'},
      horzLines:{color:'rgba(255,255,255,0.03)'},
    },
    rightPriceScale:{borderColor:'#1f2435'},
    timeScale:{
      borderColor:'#1f2435',
      timeVisible:true,
      secondsVisible:false,
      rightOffset:8,
      barSpacing:6,
      fixLeftEdge:true,   // impide desplazarse más a la izquierda del primer dato
      fixRightEdge:false, // permite ver el espacio a la derecha (follow mode)
    },
    crosshair:{mode:1},
    handleScroll:true,   // LW-Charts maneja pan nativo (mouse + touch de un dedo)
    handleScale:true,    // LW-Charts maneja zoom nativo (wheel + pinch)
  });

  // Velas: colores del archivo de referencia
  candleSeries = lwChart.addCandlestickSeries({
    upColor:      '#00e5a0',
    downColor:    '#ff4466',
    borderUpColor:'#00e5a0',
    borderDownColor:'#ff4466',
    wickUpColor:  '#00e5a0',
    wickDownColor:'#ff4466',
  });

  // Volumen superpuesto en la parte inferior (mismo pane)
  volSeries = lwChart.addHistogramSeries({
    priceScaleId:'volume',
    priceFormat:{type:'volume'},
  });
  lwChart.priceScale('volume').applyOptions({
    scaleMargins:{top:0.82, bottom:0},
  });

  // Crosshair → tooltip OHLCV
  lwChart.subscribeCrosshairMove(param=>{
    if(!param || !param.time || !param.seriesData || !param.seriesData.get(candleSeries)){
      tooltip.style.display='none'; return;
    }
    const d = param.seriesData.get(candleSeries);
    const v = param.seriesData.get(volSeries);
    const ts = param.time; // unix seconds
    const dt = new Date(ts*1000);
    const pad2=n=>String(n).padStart(2,'0');
    const fmt=dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate())
             +' '+pad2(dt.getHours())+':'+pad2(dt.getMinutes());
    document.getElementById('tt-time').textContent=fmt;
    document.getElementById('tt-open').textContent=fmtPrice(d.open);
    document.getElementById('tt-high').textContent=fmtPrice(d.high);
    document.getElementById('tt-low').textContent=fmtPrice(d.low);
    const closeEl=document.getElementById('tt-close');
    closeEl.textContent=fmtPrice(d.close);
    closeEl.style.color=d.close>=d.open?GREEN:RED;
    document.getElementById('tt-vol').textContent=v?fmtNum(v.value)+' '+asset:'—';
    tooltip.style.display='block';
    // Posición relativa al contenedor
    const rect=document.getElementById('chart-container').getBoundingClientRect();
    const mouseX=param.point ? param.point.x : 0;
    const mouseY=param.point ? param.point.y : 0;
    const tw=tooltip.offsetWidth||155, th=tooltip.offsetHeight||110;
    const x=mouseX+16+tw>rect.width ? mouseX-tw-8 : mouseX+16;
    const y=Math.max(4, Math.min(rect.height-th-4, mouseY-th/2));
    tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
  });

  // Detectar cuándo el usuario hace scroll manual (para el botón de ir al final)
  lwChart.timeScale().subscribeVisibleTimeRangeChange(()=>{
    userScrolled=true;
    updateJumpBtn();
  });

  // Resize observer: LW-Charts debe conocer el tamaño real del contenedor
  const ro = new ResizeObserver(entries=>{
    for(const e of entries){
      lwChart.applyOptions({width:e.contentRect.width, height:e.contentRect.height});
    }
  });
  ro.observe(el);
}

// ─── BOTÓN IR AL ÚLTIMO PRECIO ────────────────────────────────────────────────
function jumpToRealtime(){
  lwChart.timeScale().scrollToRealTime();
  userScrolled=false;
  updateJumpBtn();
}
function updateJumpBtn(){
  const btn=document.getElementById('jump-btn');
  if(!btn||!candles.length||!lwChart){btn&&btn.classList.remove('show');return;}
  const lastTime=Math.floor(candles[candles.length-1].t/1000);
  const range=lwChart.timeScale().getVisibleRange();
  if(!range){btn.classList.remove('show');return;}
  btn.classList.toggle('show', range.to < lastTime-5);
}

// ─── CACHÉ LOCAL ─────────────────────────────────────────────────────────────
function cacheKey(){return 'hlchart:v2:'+asset+':'+interval;}
function saveToCache(){
  try{localStorage.setItem(cacheKey(), JSON.stringify(candles));}catch(e){}
}
function loadFromCache(){
  try{
    const raw=localStorage.getItem(cacheKey());
    if(!raw)return false;
    const p=JSON.parse(raw);
    if(!Array.isArray(p)||p.length<2)return false;
    candles=p;
    applyDataToChart();
    return true;
  }catch(e){return false;}
}

// ─── APLICAR DATOS AL CHART ───────────────────────────────────────────────────
function applyDataToChart(scrollToEnd=false){
  if(!candleSeries||!candles.length)return;
  candleSeries.setData(candles.map(c=>({
    time:Math.floor(c.t/1000), open:c.o, high:c.h, low:c.l, close:c.c
  })));
  volSeries.setData(candles.map(c=>({
    time:Math.floor(c.t/1000), value:c.v, color:c.c>=c.o?'rgba(0,229,160,0.35)':'rgba(255,68,102,0.35)'
  })));
  if(scrollToEnd||!userScrolled){
    lwChart.timeScale().scrollToRealTime();
  }
  updateJumpBtn();
}

// ─── FETCH VELAS ─────────────────────────────────────────────────────────────
async function fetchCandles(opts={}){
  const {initial=false, manual=false}=opts;
  if(initial||manual){
    loader.style.display='flex';
    loaderTxt.textContent=`Cargando ${asset}-PERP ${TF_MAP[interval]||interval+'m'}…`;
  }
  if(manual){
    document.getElementById('refresh-btn').classList.add('loading');
  }
  try{
    const tfStr=TF_MAP[interval]||interval+'m';
    const end=Date.now();
    const start=end - interval*60*1000*CANDLE_LIMIT;
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'candleSnapshot',req:{coin:asset,interval:tfStr,startTime:start,endTime:end}})});
    const d=await r.json();
    const fresh=(d||[]).map(c=>({
      t:c.t, o:parseFloat(c.o), h:parseFloat(c.h), l:parseFloat(c.l), c:parseFloat(c.c), v:parseFloat(c.v)
    }));
    if(!fresh.length)throw new Error('sin datos');
    const isFirst=!candles.length;
    candles=fresh;
    saveToCache();
    applyDataToChart(isFirst); // solo scrollToEnd en la primera carga de este par/tf
    fetchMeta();
  }catch(e){
    if(initial||manual){
      loaderTxt.textContent='Error al cargar datos. Reintentando…';
      setTimeout(()=>fetchCandles(opts),3000);
      if(manual) document.getElementById('refresh-btn').classList.remove('loading');
      return;
    }
  }
  loader.style.display='none';
  if(manual) document.getElementById('refresh-btn').classList.remove('loading');
}

// ─── FETCH META (OI, FUNDING) ─────────────────────────────────────────────────
async function fetchMeta(){
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'metaAndAssetCtxs'})});
    const d=await r.json();
    const meta=d[0]?.universe||[];
    const ctxs=d[1]||[];
    const idx=meta.findIndex(m=>m.name===asset);
    if(idx>=0&&ctxs[idx]){
      const info=ctxs[idx];
      const fr=parseFloat(info.funding)*100;
      const oi=parseFloat(info.openInterest);
      const mark=parseFloat(info.markPx);
      const oracle=parseFloat(info.oraclePx);
      setEl('stat-oi', fmtNum(oi)+' '+asset, 'neutral');
      setEl('stat-funding', (fr>=0?'+':'')+fr.toFixed(4)+'%', fr>=0?'up':'down');
      setEl('b-mark', fmtPrice(mark));
      setEl('b-index', fmtPrice(oracle));
      setEl('b-oi', fmtNum(oi)+' '+asset);
      setEl('b-fund', (fr>=0?'+':'')+fr.toFixed(4)+'%');
      const now=new Date();
      const next=new Date(now);next.setMinutes(0,0,0);next.setHours(next.getHours()+1);
      document.getElementById('b-nextfund').textContent=Math.round((next-now)/60000)+'m';
    }
  }catch(e){}
  if(candles.length){
    const last=candles[candles.length-1];
    const first=candles[0];
    const highs=candles.map(c=>c.h); const lows=candles.map(c=>c.l);
    const totalVol=candles.reduce((s,c)=>s+c.v,0);
    document.getElementById('stat-high').textContent=fmtPrice(Math.max(...highs));
    document.getElementById('stat-low').textContent=fmtPrice(Math.min(...lows));
    document.getElementById('b-vol').textContent='$'+fmtNum(totalVol*last.c);
    const chg=(last.c-first.o)/first.o*100;
    const pd=document.getElementById('price-display');
    pd.textContent=fmtPrice(last.c);
    pd.className=chg>=0?'up':'down';
    const pc=document.getElementById('price-change');
    pc.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
    pc.style.color=chg>=0?GREEN:RED;
  }
}

// ─── FETCH ACTIVOS ────────────────────────────────────────────────────────────
async function fetchAssets(){
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'meta'})});
    const d=await r.json();
    allAssets=(d.universe||[]).map(a=>a.name).sort();
    if(!allAssets.length)throw new Error('');
  }catch(e){
    allAssets=['BTC','ETH','SOL','ARB','OP','AVAX','DOGE','BNB','MATIC','LTC',
      'ATOM','LINK','UNI','APT','SUI','INJ','TIA','NEAR','SEI','STX','WIF',
      'BONK','JTO','PYTH','JUP','RNDR','FTM','AAVE','CRV','MKR','HYPE'];
  }
  renderAssetList('');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtPrice(p){
  if(!p||isNaN(p))return'—';
  if(p>=1000)return p.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(p>=1)return p.toFixed(4);
  return p.toFixed(6);
}
function fmtNum(n){
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function setEl(id,txt,cls){
  const el=document.getElementById(id); if(!el)return;
  el.textContent=txt;
  if(cls) el.className='stat-value '+(cls||'');
}

// ─── BÚSQUEDA DE ACTIVOS ─────────────────────────────────────────────────────
function renderAssetList(q){
  const list=document.getElementById('asset-list');
  const filtered=q?allAssets.filter(a=>a.toLowerCase().includes(q.toLowerCase())):allAssets;
  list.innerHTML='';
  for(const a of filtered.slice(0,80)){
    const div=document.createElement('div');
    div.className='asset-item';
    div.innerHTML=`<span class="name">${a}-PERP</span><span class="tag">PERP</span>`;
    div.addEventListener('click',()=>selectAsset(a));
    list.appendChild(div);
  }
}
function selectAsset(a){
  asset=a;
  document.getElementById('asset-name').textContent=a;
  document.getElementById('search-overlay').classList.remove('open');
  candles=[]; userScrolled=false;
  const hit=loadFromCache();
  fetchCandles({initial:!hit});
}
document.getElementById('asset-btn').addEventListener('click',()=>{
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').value='';
  renderAssetList('');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
});
document.getElementById('search-input').addEventListener('input',e=>renderAssetList(e.target.value));
document.getElementById('search-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('search-overlay'))
    document.getElementById('search-overlay').classList.remove('open');
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('search-overlay').classList.remove('open');
});

// ─── BOTONES DE TEMPORALIDAD ──────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    interval=parseInt(btn.dataset.tf);
    candles=[]; userScrolled=false;
    const hit=loadFromCache();
    fetchCandles({initial:!hit});
  });
});

// ─── BOTÓN ACTUALIZAR ─────────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click',()=>{
  fetchAssets();
  fetchCandles({manual:true});
});

// ─── BLOQUEAR SCROLL DE PÁGINA (el propio LW-Charts solo bloquea dentro del chart) ──
// body ya tiene position:fixed + overflow:hidden, pero hay que evitar
// que gestos fuera del chart (barra superior, etc.) scrolleen la página.
document.addEventListener('touchmove', e=>{
  // Permitir scroll solo en la lista de activos
  if(!e.target.closest('#asset-list')) e.preventDefault();
}, {passive:false});
document.addEventListener('wheel', e=>{
  if(!e.target.closest('#lw-chart') && !e.target.closest('#asset-list'))
    e.preventDefault();
}, {passive:false});

// ─── INIT ─────────────────────────────────────────────────────────────────────
initChart();
fetchAssets();
const cacheHit = loadFromCache();
fetchCandles({initial:!cacheHit});
// Auto-refresh cada 15s preservando posición del usuario
setInterval(()=>{ if(candles.length) fetchCandles(); }, 15000);
</script>
